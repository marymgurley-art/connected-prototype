<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Discovery Book</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:radial-gradient(ellipse at center,#4a2f1a,#2a1508);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;font-family:'Nunito',sans-serif}
.book-title{font-family:'Fredoka One',cursive;color:#f4d03f;font-size:20px;letter-spacing:3px;text-shadow:2px 2px 8px rgba(0,0,0,.6);margin-bottom:12px}

/* BOOK */
.book{display:flex;width:min(960px,98vw);height:min(610px,85vh);border-radius:6px 18px 18px 6px;box-shadow:0 0 0 3px #1a0a02,0 24px 70px rgba(0,0,0,.7)}
.spine{width:26px;background:linear-gradient(to right,#150801,#4a2f1a 30%,#6b4020 50%,#4a2f1a 70%,#150801);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.spine span{font-family:'Fredoka One',cursive;color:#c8a84b;font-size:8px;letter-spacing:3px;writing-mode:vertical-rl}

/* PAGES */
.page{flex:1;background:#fdf6e8;display:flex;flex-direction:column;overflow:hidden;position:relative}
.page-left{border-radius:6px 0 0 6px}
.page-right{border-radius:0 18px 18px 0;border-left:1px solid #e2d0b0}

/* ILLUSTRATION */
.illustration{width:100%;height:230px;position:relative;overflow:hidden;flex-shrink:0}
.scene{width:100%;height:100%;position:relative;display:flex;align-items:flex-end;justify-content:center}
.scene svg{position:absolute;bottom:0;left:50%;transform:translateX(-50%);height:210px}
.scene-env{position:absolute;inset:0}

/* LEFT PAGE CONTENT */
.left-content{padding:14px 22px 8px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.dino-name{font-family:'Fredoka One',cursive;font-size:28px;color:#2d1a0a;line-height:1}
.dino-say{font-size:11px;color:#aaa;font-style:italic;margin:2px 0 10px}
.dino-para{font-size:13px;line-height:1.6;color:#3a2a1a;flex:1;overflow:hidden}

/* PAGE FOOTER */
.page-foot{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-top:1px solid #e2d0b0;flex-shrink:0}
.pg-num{font-size:11px;color:#ccc;font-style:italic}
.btn{padding:7px 16px;border:none;border-radius:20px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer;transition:all .1s}
.btn-sound{background:#c0392b;color:#fff;box-shadow:0 3px 0 #922b21}.btn-sound:active{transform:translateY(3px);box-shadow:none}
.btn-nav{background:none;border:2px solid #d4b896;color:#8b6343;font-size:13px;padding:5px 13px;border-radius:20px;cursor:pointer;font-family:'Fredoka One',cursive}
.btn-nav:hover{background:#d4b896;color:#3d2010}.btn-nav:disabled{opacity:.3;cursor:default}

/* RIGHT PAGE CONTENT */
.right-content{padding:14px 18px 8px;flex:1;display:flex;flex-direction:column;gap:10px;overflow:hidden}

/* EGG */
.egg-row{display:flex;gap:14px;align-items:flex-start;flex-shrink:0}
.egg-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.egg{width:54px;height:66px;background:radial-gradient(ellipse at 35% 30%,#fff8d0,#e8c820,#b8960a);border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:2px 4px 12px rgba(0,0,0,.2);transition:transform .1s;user-select:none}
.egg:hover{transform:scale(1.1) rotate(6deg)}.egg:active{transform:scale(.9)}
.egg-hint{font-size:9px;color:#bbb;font-weight:800}
.facts-col{flex:1}
.facts-lbl{font-family:'Fredoka One',cursive;font-size:13px;color:#2d6a1f;margin-bottom:5px}
.fact{padding:6px 10px;background:#fff;border-radius:9px;margin-bottom:6px;font-size:11.5px;font-weight:700;color:#2d2d2d;opacity:0;transform:translateX(14px);transition:all .35s ease;box-shadow:0 1px 5px rgba(0,0,0,.06);border-left:3px solid #e6920a}
.fact.show{opacity:1;transform:translateX(0)}

/* GAME BOX */
.game-box{flex:1;border:2px dashed #d4b896;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.game-head{background:#2d6a1f;color:#fff;font-family:'Fredoka One',cursive;font-size:13px;padding:5px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-reset{background:rgba(255,255,255,.2);border:none;color:#fff;padding:2px 9px;border-radius:8px;font-size:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700}
.game-body{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#fff}

/* ---- FOSSIL DIG ---- */
.dig-wrap{position:relative;width:100%;height:100%}
.dig-bones{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
.bones-svg{width:80%;height:80%}
.dig-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;z-index:2}
.dig-pct{position:absolute;top:5px;right:8px;font-size:10px;font-weight:800;color:#fff;text-shadow:1px 1px 4px rgba(0,0,0,.9);z-index:3;pointer-events:none}

/* ---- MATCHING ---- */
.match-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-around;padding:8px;gap:6px}
.match-lbl{font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:1px}
.match-row{display:flex;gap:8px}
.mcard{width:78px;height:62px;border:3px solid #e0d0b8;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#fdf6e8;transition:all .18s;user-select:none}
.mcard .ico{font-size:26px;line-height:1}
.mcard .lbl{font-size:9px;font-weight:800;color:#888;margin-top:2px}
.mcard:hover:not(.done):not(.locked){border-color:#2d6a1f;transform:scale(1.05)}
.mcard.sel{border-color:#e6920a;background:#fff8e0;transform:scale(1.08);box-shadow:0 0 0 3px rgba(230,146,10,.3)}
.mcard.done{border-color:#2d6a1f;background:#e8f5e0;cursor:default}
.mcard.bad{border-color:#c0392b;animation:shake .4s}
.match-hint{font-size:10px;color:#bbb;font-weight:700}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---- PUZZLE ---- */
.puzzle-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px}
.puzzle-hint{font-size:10px;color:#888;font-weight:700}
.puzzle-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:4px;width:220px;height:110px}
.p-slot{border:2px dashed #d4b896;border-radius:6px;background:#f5ecd8;display:flex;align-items:center;justify-content:center;font-size:11px;color:#ccc;font-weight:800;transition:all .2s;cursor:pointer}
.p-slot.correct{border:2px solid #2d6a1f;background:#e8f5e0}
.p-slot.highlight{border-color:#e6920a;background:#fff8e0}
.puzzle-tray{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:6px 10px;background:#f0e8d8;border-radius:10px;width:230px}
.p-piece{width:44px;height:40px;border:2px solid #c8a878;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .18s;user-select:none}
.p-piece:hover:not(.used){border-color:#2d6a1f;transform:scale(1.08)}
.p-piece.sel{border-color:#e6920a;background:#fff8e0;transform:scale(1.1);box-shadow:0 0 0 2px rgba(230,146,10,.4)}
.p-piece.used{opacity:.25;cursor:default}

/* CELEBRATION */
.party{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#e6920a;color:#fff;font-family:'Fredoka One',cursive;font-size:28px;padding:18px 36px;border-radius:20px;z-index:999;opacity:0;pointer-events:none;transition:opacity .3s;box-shadow:0 10px 40px rgba(0,0,0,.4);text-align:center}
.party.show{opacity:1}
</style>
</head>
<body>

<div class="book-title">📖 DINO DISCOVERY BOOK</div>

    <div class="illustration" id="illus"></div>

    </div>
    <div class="page-foot">

      <span class="pg-num" id="pgL"></span>
      <button class="btn btn-sound" onclick="snd(dinos[cur].sound)">🔊 Hear it!</button>
      <button class="btn-nav" id="nextBtn" onclick="go(1)">Next →</button>
    </div>
  </div>

  <div class="spine"><span>DINO BOOK</span></div>

  <!-- RIGHT PAGE -->
  <div class="page page-right">
    <div class="right-content">

        <div class="egg-wrap">

        </div>
        <div class="facts-col">

          <div id="factList"></div>
        </div>
      </div>
      <div class="game-box">
        <div class="game-head">
          <span id="gameTitle">🎮 Game</span>
          <button class="game-reset" onclick="resetGame()">↺ Try Again</button>
        </div>
        <div class="game-body" id="gameBody"></div>
      </div>
    </div>
    <div class="page-foot">
      <span></span>
      <span class="pg-num" id="pgR"></span>
      <span></span>
    </div>
  </div>
</div>

<div class="party" id="party"></div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let cur=0, factsShown=0;

// ─── RENDER PAGE ──────────────────────────────────────────────────────────────
function render(i){
  cur=i; factsShown=0;
  const d=dinos[i];

  // Illustration
  document.getElementById('illus').innerHTML=`
    <div class="scene">
      <div class="scene-env" style="background:linear-gradient(180deg,${d.skyA} 0%,${d.skyB} 62%,transparent 62%)"></div>
      <div class="scene-env" style="top:62%;background:${d.ground}"></div>
      ${d.scene}
    </div>`;

  document.getElementById('dName').textContent=d.name;
  document.getElementById('dSay').textContent='Say it: '+d.say;
  document.getElementById('dPara').textContent=d.para;

  const p=i*2+1;
  document.getElementById('pgL').textContent='Page '+p;
  document.getElementById('pgR').textContent='Page '+(p+1);
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').disabled=i===dinos.length-1;

  document.getElementById('egg').textContent='🥚';
  document.getElementById('factList').innerHTML=d.facts.map((f,j)=>
    `<div class="fact" id="f${j}">${f}</div>`).join('');

  document.getElementById('gameTitle').textContent=d.gameTitle;
  buildGame(d);
}

function go(dir){const n=cur+dir;if(n>=0&&n<dinos.length)render(n);}

// ─── EGG ─────────────────────────────────────────────────────────────────────
function tapEgg(){
  const d=dinos[cur];
  if(factsShown>=d.facts.length)return;
  document.getElementById('f'+factsShown).classList.add('show');
  factsShown++;
  const egg=document.getElementById('egg');
  if(factsShown===1)egg.textContent='🪺';
  else if(factsShown===2)egg.textContent='🐣';
  else{egg.textContent='🦕';party('🎉 All facts discovered! You\'re a dino expert! 🦕');}
}

// ─── PARTY ───────────────────────────────────────────────────────────────────
function party(msg){
  const el=document.getElementById('party');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ─── SOUND ───────────────────────────────────────────────────────────────────
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function snd(type){
  const ctx=getAC(),t=ctx.currentTime;
  if(type==='bonk'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(60,t+.4);
    g.gain.setValueAtTime(.9,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
    o.start(t);o.stop(t+.5);
  }
  if(type==='thwack'){
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*.3),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
    f.type='lowpass';f.frequency.value=300;s.buffer=buf;
    s.connect(f);f.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(2,t);s.start(t);
  }
  if(type==='munch'){
    for(let i=0;i<4;i++){const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.value=100+Math.random()*40;o.connect(g);g.connect(ctx.destination);const q=t+i*.18;g.gain.setValueAtTime(.5,q);g.gain.exponentialRampToValueAtTime(.001,q+.15);o.start(q);o.stop(q+.16);}
  }
  if(type==='coo'){
    [440,494,523,440].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;o.connect(g);g.connect(ctx.destination);const q=t+i*.14;g.gain.setValueAtTime(.3,q);g.gain.exponentialRampToValueAtTime(.001,q+.12);o.start(q);o.stop(q+.13);});
  }
  if(type==='ding'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=880;o.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);
  }
}

// ─── GAME ROUTER ─────────────────────────────────────────────────────────────
function buildGame(d){
  if(d.game==='fossil')buildFossil(d);
  else if(d.game==='matching')buildMatching(d);
  else if(d.game==='puzzle')buildPuzzle(d);
}
function resetGame(){buildGame(dinos[cur]);}

// ─── FOSSIL DIG ───────────────────────────────────────────────────────────────
let digging=false;
function buildFossil(d){
  digging=false;
  document.getElementById('gameBody').innerHTML=`
    <div class="dig-wrap" id="dw">
      <div class="dig-bones">
        <svg class="bones-svg" viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
          <!-- Dome skull -->
          <ellipse cx="60" cy="60" rx="38" ry="32" fill="${d.boneColor}" opacity=".9"/>
          <ellipse cx="60" cy="48" rx="24" ry="18" fill="#e8d080"/>
          <!-- Jaw -->
          <rect x="32" y="78" width="50" height="14" rx="5" fill="${d.boneColor}"/>
          <!-- Teeth -->
          <rect x="38" y="88" width="6" height="9" rx="2" fill="#f0e8c0"/>
          <rect x="49" y="88" width="6" height="9" rx="2" fill="#f0e8c0"/>
          <rect x="60" y="88" width="6" height="9" rx="2" fill="#f0e8c0"/>
          <!-- Spine -->
          <path d="M98 70 Q160 55 220 65" stroke="${d.boneColor}" stroke-width="10" fill="none" stroke-linecap="round"/>
          <!-- Ribs -->
          <path d="M120 72 Q118 98 112 112" stroke="${d.boneColor}" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M140 68 Q140 95 134 110" stroke="${d.boneColor}" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M160 66 Q162 92 157 107" stroke="${d.boneColor}" stroke-width="7" fill="none" stroke-linecap="round"/>
          <path d="M180 67 Q184 90 181 105" stroke="${d.boneColor}" stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- Leg bones -->
          <rect x="126" y="112" width="12" height="26" rx="5" fill="${d.boneColor}"/>
          <rect x="154" y="112" width="12" height="26" rx="5" fill="${d.boneColor}"/>
          <!-- Dome label -->
          <text x="60" y="125" text-anchor="middle" font-size="11" font-weight="bold" fill="#8B6914" opacity=".8">DOME SKULL</text>
        </svg>
      </div>
      <canvas class="dig-canvas" id="dc"></canvas>
      <div class="dig-pct" id="dpct">🪣 Dig! 0% uncovered</div>
    </div>`;

  const canvas=document.getElementById('dc');
  const dw=document.getElementById('dw');
  canvas.width=dw.offsetWidth||340;
  canvas.height=dw.offsetHeight||150;
  const ctx=canvas.getContext('2d');

  // Draw rich dirt
  ctx.fillStyle='#7a4e2a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<400;i++){
    const x=Math.random()*canvas.width,y=Math.random()*canvas.height,r=Math.random()*9+2;
    ctx.fillStyle=Math.random()>.5?'rgba(50,25,5,.35)':'rgba(160,100,50,.3)';
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  for(let i=0;i<25;i++){
    const x=Math.random()*canvas.width,y=Math.random()*canvas.height;
    ctx.fillStyle='rgba(60,40,20,.5)';
    ctx.beginPath();ctx.ellipse(x,y,7,4,Math.random()*Math.PI,0,Math.PI*2);ctx.fill();
  }

  const total=canvas.width*canvas.height;
  let done=false;
  let lastPct=0;

  function dig(e){
    if(!digging)return;
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const x=(e.clientX-r.left)*sx,y=(e.clientY-r.top)*sy;
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.arc(x,y,24,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    // Sample ~every 3rd pixel for performance
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    let clear=0;
    for(let p=3;p<img.data.length;p+=16)if(img.data[p]<128)clear++;
    const pct=Math.min(100,Math.round(clear/(total/4)*100));
    if(pct!==lastPct){lastPct=pct;document.getElementById('dpct').textContent=`🦴 ${pct}% uncovered!`;}
    if(pct>=62&&!done){done=true;party('🦕 Amazing fossil find! You\'re a real paleontologist! 🎉');snd('ding');}
  }

  canvas.onmousedown=e=>{digging=true;dig(e);};
  canvas.onmousemove=dig;
  canvas.onmouseup=canvas.onmouseleave=()=>digging=false;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();digging=true;dig(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();dig(e.touches[0]);},{passive:false});
  canvas.addEventListener('touchend',()=>digging=false);
}

// ─── MATCHING GAME ────────────────────────────────────────────────────────────
let mState={type:null,idx:null}, mDone=new Set();

function buildMatching(d){
  mState={type:null,idx:null};mDone=new Set();
  const pairs=d.pairs;
  const sb=[...pairs].sort(()=>Math.random()-.5);
  const sm=[...pairs].sort(()=>Math.random()-.5);

  document.getElementById('gameBody').innerHTML=`
    <div class="match-wrap">
      <div class="match-lbl">👶 Babies — tap one!</div>
      <div class="match-row">${sb.map(p=>`
        <div class="mcard" id="b${p.id}" onclick="mClick('b',${p.id})">
          <div class="ico">${p.baby}</div><div class="lbl">${p.bname}</div>
        </div>`).join('')}</div>
      <div class="match-lbl">🦕 Mamas — tap its mama!</div>
      <div class="match-row">${sm.map(p=>`
        <div class="mcard" id="m${p.id}" onclick="mClick('m',${p.id})">
          <div class="ico">${p.mama}</div><div class="lbl">${p.mname}</div>
        </div>`).join('')}</div>
      <div class="match-hint">Match each baby to its mama!</div>
    </div>`;
}

function mClick(side,id){
  if(mDone.has(id))return;
  if(!mState.type){
    mState={type:side,idx:id};
    document.getElementById(side+id).classList.add('sel');
  } else if(mState.type===side){
    document.getElementById(mState.type+mState.idx).classList.remove('sel');
    mState={type:side,idx:id};
    document.getElementById(side+id).classList.add('sel');
  } else {
    const prev=document.getElementById(mState.type+mState.idx);
    const curr=document.getElementById(side+id);
    prev.classList.remove('sel');
    if(mState.idx===id){
      // Match!
      prev.classList.add('done');curr.classList.add('done');
      mDone.add(id);snd('ding');
      if(mDone.size===dinos[cur].pairs.length)party('🎉 You matched them all! Great job! 🦕');
    } else {
      curr.classList.add('bad');
      setTimeout(()=>curr.classList.remove('bad'),500);
    }
    mState={type:null,idx:null};
  }
}

// ─── PUZZLE GAME ─────────────────────────────────────────────────────────────
let pSel=null, pPlaced={};

function buildPuzzle(d){
  pSel=null;pPlaced={};
  const pieces=d.pieces;
  const shuffled=[...pieces].sort(()=>Math.random()-.5);
  const COLS=4,ROWS=2;
  const N=pieces.length; // 8

  document.getElementById('gameBody').innerHTML=`
    <div class="puzzle-wrap">
      <div class="puzzle-hint">Tap a piece from the tray, then tap the matching slot!</div>
      <div class="puzzle-grid" id="pgrid">
        ${pieces.map((p,i)=>`
          <div class="p-slot" id="ps${i}" data-slot="${i}" onclick="slotClick(${i})">
            <span style="font-size:9px;color:#ccc;font-weight:800">${p.label}</span>
          </div>`).join('')}
      </div>
      <div class="puzzle-tray" id="ptray">
        ${shuffled.map((p,i)=>`
          <div class="p-piece" id="pp${i}" data-label="${p.label}" data-slot="${pieces.indexOf(p)}" onclick="pieceClick(${i})">${p.e}</div>`).join('')}
      </div>
    </div>`;
}

function pieceClick(i){
  const el=document.getElementById('pp'+i);
  if(el.classList.contains('used'))return;
  document.querySelectorAll('.p-piece.sel').forEach(e=>e.classList.remove('sel'));
  if(pSel===i){pSel=null;return;}
  el.classList.add('sel');
  pSel=i;
}

function slotClick(s){
  if(pSel===null)return;
  if(pPlaced[s])return;
  const piece=document.getElementById('pp'+pSel);
  const correctSlot=parseInt(piece.dataset.slot);
  const slot=document.getElementById('ps'+s);

  if(correctSlot===s){
    slot.innerHTML=`<div style="font-size:20px;display:flex;flex-direction:column;align-items:center;gap:2px">
      ${dinos[cur].pieces[s].e}
      <span style="font-size:8px;font-weight:800;color:#2d6a1f">${dinos[cur].pieces[s].label}</span>
    </div>`;
    slot.classList.add('correct');
    piece.classList.add('used');
    pPlaced[s]=true;pSel=null;
    snd('ding');
    document.querySelectorAll('.p-piece.sel').forEach(e=>e.classList.remove('sel'));
    if(Object.keys(pPlaced).length===dinos[cur].pieces.length)
      party('🧩 Puzzle complete! Awesome work! 🦕');
  } else {
    slot.classList.add('highlight');
    setTimeout(()=>slot.classList.remove('highlight'),500);
  }
}

// ─── START ────────────────────────────────────────────────────────────────────
render(0);
</script>
