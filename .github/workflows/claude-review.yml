name: Claude Code Review                                                                                                               
  on:                                         
    pull_request:                                                                                                                        
      types: [opened, synchronize, reopened]
                                                                                                                                         
  permissions:
    contents: read                                                                                                                       
    pull-requests: write

  jobs:
    review:
      runs-on: ubuntu-latest
      steps:                                  
        - uses: actions/checkout@v4       
          with:
            fetch-depth: 0                                                                                                               
        - uses: anthropics/claude-code-action@beta
          with:                                                                                                                          
            anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
            direct_prompt: "Review this pull request for bugs, edge cases, code clarity, and any issues. Leave specific comments on lines
   with problems."          
